name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: "1"

jobs:
  lint-and-types:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (core + adapters + dev)
        run: uv sync --extra all --extra dev
      - name: Ruff lint
        run: uv run ruff check --output-format=github .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (core + adapters + dev)
        run: uv sync --extra all --extra dev
      - name: Run unit tests
        run: uv run pytest -m "not integration" -v

  integration-tests:
    name: Integration tests (live services)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: vismaran
          POSTGRES_PASSWORD: vismarandev
          POSTGRES_DB: vismaran
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vismaran -d vismaran"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      neo4j:
        image: neo4j:5.24-community
        env:
          NEO4J_AUTH: neo4j/vismarandev
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
      clickhouse:
        image: clickhouse/clickhouse-server:25.4
        env:
          CLICKHOUSE_DB: tensorzero
          CLICKHOUSE_USER: tensorzero
          CLICKHOUSE_PASSWORD: vismarandev
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget -q --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --ulimit nofile=262144:262144
    env:
      VISMARAN_TEST_PG_DSN: postgres://vismaran:vismarandev@localhost:5432/vismaran
      VISMARAN_TEST_NEO4J_URL: bolt://localhost:7687
      VISMARAN_TEST_NEO4J_USER: neo4j
      VISMARAN_TEST_NEO4J_PASSWORD: vismarandev
      VISMARAN_TEST_CLICKHOUSE_URL: http://localhost:8123
      VISMARAN_TEST_CLICKHOUSE_USER: tensorzero
      VISMARAN_TEST_CLICKHOUSE_PASSWORD: vismarandev
      VISMARAN_TEST_CLICKHOUSE_DB: tensorzero
      PGPASSWORD: vismarandev
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (core + adapters + dev)
        run: uv sync --extra all --extra dev
      - name: Apply Postgres schema
        run: psql "$VISMARAN_TEST_PG_DSN" -v ON_ERROR_STOP=1 -f docker/postgres-init/01-pgvector-and-provenance.sql
      - name: Bootstrap TensorZero schema in ClickHouse
        # The TensorZero gateway applies its ClickHouse migrations on startup —
        # that's how we get the real schema (no hand-rolled DDL). Run it against
        # the clickhouse service and poll until the tables exist.
        run: |
          docker run -d --name tz-migrate --network host \
            -v "$PWD/docker/tensorzero.toml:/app/tensorzero.toml:ro" \
            -e TENSORZERO_CLICKHOUSE_URL="http://tensorzero:vismarandev@localhost:8123/tensorzero" \
            -e ANTHROPIC_API_KEY=dummy -e OPENAI_API_KEY=dummy \
            tensorzero/gateway:latest --config-file /app/tensorzero.toml
          echo "Waiting for TensorZero migrations to create all 7 target tables..."
          tables="'ChatInference','JsonInference','ModelInference','BooleanMetricFeedback','FloatMetricFeedback','CommentFeedback','DemonstrationFeedback'"
          q="SELECT count() FROM system.tables WHERE database='tensorzero' AND name IN ($tables)"
          for i in $(seq 1 60); do
            ready=$(curl -s 'http://localhost:8123/?user=tensorzero&password=vismarandev' --data-binary "$q" || echo 0)
            if [ "$ready" = "7" ]; then echo "TensorZero schema ready (7/7 tables)"; exit 0; fi
            sleep 2
          done
          echo "TensorZero schema did not materialize in time (got $ready/7)" >&2
          docker logs tz-migrate >&2 || true
          exit 1
      - name: Run integration tests
        run: uv run pytest -m integration -v
